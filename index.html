<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forever Gift</title>

<style>
body{
    margin:0;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ffd6e7,#fff);
    font-family:Arial,sans-serif;
    overflow:hidden;
    padding:20px;
    box-sizing:border-box;
}

.container{
    width:90%;
    max-width:700px;
    text-align:center;
    padding:30px;
    border-radius:30px;
    background:rgba(255,255,255,0.8);
    backdrop-filter:blur(10px);
    box-shadow:0 10px 30px rgba(255,0,80,.2);
    position:relative;
    z-index:2;
}

h1{
    color:#d10047;
    font-size:34px;
    margin-bottom:20px;
}

p{
    color:#b3003c;
    font-size:19px;
    line-height:1.8;
}

.counter{
    margin-top:20px;
    color:#d10047;
    font-size:24px;
    font-weight:bold;
}

.forever{
    margin-top:20px;
    font-size:32px;
    color:red;
}

.floating{
    position:absolute;
    font-size:28px;
    animation:float 10s linear infinite;
    opacity:.8;
    pointer-events:none;
}

@keyframes float{
    0%{
        transform:translateY(100vh) scale(0.8);
        opacity:0;
    }

    20%{
        opacity:1;
    }

    100%{
        transform:translateY(-10vh) scale(1.2);
        opacity:0;
    }
}
</style>
</head>

<body>

<div class="container">

<h1>🍓 Together forever ma little juju 🍓</h1>

<p>
Love u ma baby girl,<br>
rich in life because I have u,<br>
I hope u stay in my life forever,<br>
I promise to keep u in my life,<br>
happy and safe always,<br>
love u ma future wife ❤️
</p>

<div class="counter" id="counter"></div>

<div class="forever">Forever ♾️</div>

</div>

<script>
function updateCounter() {

    const start = new Date("2025-05-11T22:52:00");
    const now = new Date();

    const diff = now - start;

    const days = Math.floor(diff / (1000 * 60 * 60 * 24));
    const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
    const mins = Math.floor((diff / (1000 * 60)) % 60);
    const secs = Math.floor((diff / 1000) % 60);

    document.getElementById("counter").innerHTML =
        days + " days " +
        hours + " hrs " +
        mins + " mins " +
        secs + " secs ❤️";
}

updateCounter();
setInterval(updateCounter, 1000);

function createFloating() {

    const item = document.createElement("div");
    item.classList.add("floating");

    const icons = ["🍓","❤️","🌹","🧸"];

    item.innerHTML = icons[Math.floor(Math.random() * icons.length)];

    item.style.left = Math.random() * 100 + "vw";
    item.style.animationDuration = (6 + Math.random() * 5) + "s";
    item.style.fontSize = (20 + Math.random() * 20) + "px";

    document.body.appendChild(item);

    setTimeout(function(){
        item.remove();
    },10000);
}

setInterval(createFloating,700);
</script>

</body>
</html>
