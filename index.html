<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forever Gift 💖</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
background:linear-gradient(135deg,#ffd6e7,#fff);
overflow:hidden;
padding:20px;
}

.container{
text-align:center;
padding:25px;
background:rgba(255,255,255,0.85);
border-radius:25px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
position:relative;
z-index:1;
width:90%;
max-width:650px;
}

h1{
color:#d10047;
margin-bottom:15px;
}

p{
color:#b3003c;
line-height:1.8;
}

.counter{
margin-top:15px;
font-size:20px;
color:#d10047;
font-weight:bold;
}

/* Envelope */
.envelope{
margin:30px auto 0;
width:300px;
height:210px;
position:relative;
cursor:pointer;
z-index:5;
}

.base{
position:absolute;
bottom:0;
width:100%;
height:150px;
background:#fff;
border-radius:0 0 18px 18px;
box-shadow:0 8px 20px rgba(0,0,0,0.15);
}

.flap{
position:absolute;
top:0;
width:100%;
height:130px;
background:#ffe1ec;
clip-path:polygon(0 0,100% 0,50% 100%);
transform-origin:top;
transition:1s;
z-index:5;
}

.sticker{
position:absolute;
top:70px;
left:50%;
transform:translateX(-50%);
background:#ff4f87;
color:#fff;
padding:8px 14px;
border-radius:50px;
font-size:22px;
z-index:6;
}

/* Letter */
.letter{
position:absolute;
bottom:10px;
left:10px;
width:280px;
height:180px;
background:#fff;
border-radius:15px;
overflow:hidden;
box-shadow:0 10px 25px rgba(0,0,0,0.15);
transition:1s;
}

/* Slider */
.slider{
position:relative;
width:100%;
height:100%;
}

.slider img{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
opacity:0;
transition:1s;
}

.slider img.active{
opacity:1;
}

/* open animation */
.open .flap{
transform:rotateX(180deg);
}

.open .letter{
transform:translateY(-110px);
}

</style>
</head>

<body>

<div class="container">

<h1>🍓 Together Forever 🍓</h1>

<p>
Love u ❤️<br>
I hope u stay in my life forever<br>
I promise to keep u happy always<br>
Forever ♾️
</p>

<div class="counter" id="counter"></div>

<!-- Envelope -->
<div class="envelope" onclick="openLetter()">

<div class="flap"></div>
<div class="base"></div>
<div class="sticker">🍓</div>

<div class="letter">
<div class="slider">

<img src="./images/pic1.jpg" class="active">
<img src="./images/pic2.jpg">
<img src="./images/pic3.jpg">
<img src="./images/pic4.jpg">

</div>
</div>

</div>

</div>

<script>

/* Counter */
function updateCounter(){
const start = new Date("2025-05-11T22:52:00");
const now = new Date();

const diff = now - start;

const days = Math.floor(diff / (1000*60*60*24));
const hours = Math.floor((diff / (1000*60*60)) % 24);
const mins = Math.floor((diff / (1000*60)) % 60);
const secs = Math.floor((diff / 1000) % 60);

document.getElementById("counter").innerHTML =
days + " days " + hours + " hrs " + mins + " mins " + secs + " secs ❤️";
}

updateCounter();
setInterval(updateCounter,1000);

/* Envelope */
let opened=false;

function openLetter(){
document.querySelector(".envelope").classList.toggle("open");

if(!opened){
startSlider();
opened=true;
}
}

/* Slider */
let index=0;

function startSlider(){
const imgs=document.querySelectorAll(".slider img");

setInterval(()=>{
imgs[index].classList.remove("active");
index=(index+1)%imgs.length;
imgs[index].classList.add("active");
},2000);
}

</script>

</body>
</html>
