<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forever Gift 💖</title>

<style>
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial;
background:linear-gradient(135deg,#ffd6e7,#fff);
overflow:hidden;
}

.container{
text-align:center;
background:rgba(255,255,255,0.85);
padding:30px;
border-radius:25px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
width:90%;
max-width:600px;
position:relative;
z-index:10;
}

h1{
color:#d10047;
font-size:30px;
}

p{
color:#b3003c;
line-height:1.8;
}

.counter{
margin-top:15px;
font-size:20px;
color:#d10047;
font-weight:bold;
}

.forever{
margin-top:10px;
font-size:28px;
color:red;
}

/* ENVELOPE */
.envelope{
margin:30px auto 0;
width:300px;
height:200px;
position:relative;
cursor:pointer;
z-index:1;
perspective:1000px;
}

.base{
position:absolute;
bottom:0;
width:100%;
height:140px;
background:white;
border-radius:0 0 18px 18px;
box-shadow:0 8px 20px rgba(0,0,0,0.15);
}

.flap{
position:absolute;
top:0;
width:100%;
height:120px;
background:#ffe1ec;
clip-path:polygon(0 0,100% 0,50% 100%);
transform-origin:top;
transition:1s;
z-index:5;
}

.sticker{
position:absolute;
top:60px;
left:50%;
transform:translateX(-50%);
background:#ff4f87;
color:white;
padding:8px 14px;
border-radius:50px;
font-size:20px;
z-index:6;
}

/* LETTER (واقعي - ينزل لجوه) */
.letter{
position:absolute;
bottom:10px;
left:10px;
width:280px;
height:170px;
background:white;
border-radius:15px;
box-shadow:0 8px 20px rgba(0,0,0,0.1);
transition:1s;
z-index:2;
overflow:hidden;
}

/* MESSAGE */
.message{
position:absolute;
top:45%;
left:50%;
transform:translate(-50%,-50%);
font-size:18px;
color:#d10047;
font-weight:bold;
opacity:0;
transition:1s;
text-align:center;
width:90%;
}

/* ROSE */
.rose{
position:absolute;
top:70%;
left:50%;
transform:translate(-50%,20px);
font-size:35px;
opacity:0;
transition:1s;
}

/* OPEN ANIMATION (واقعي) */
.open .flap{
transform:rotateX(-160deg);
}

.open .letter{
transform:translateY(30px) scale(1.02);
}

.open .message{
opacity:1;
transform:translate(-50%,-55%);
}

.open .rose{
opacity:1;
transform:translate(-50%,-10px) scale(1.3);
}

/* HEARTS */
.heart{
position:absolute;
font-size:20px;
animation:float 8s linear infinite;
opacity:0.7;
}

@keyframes float{
0%{transform:translateY(100vh);}
100%{transform:translateY(-10vh);}
}

</style>
</head>

<body>

<div class="container">

<h1>🍓 Together for ever ma little juju 🍓</h1>

<p>
Love u ma baby girl,<br>
rich in life because I have u,<br>
I hope u stay in my life forever,<br>
I promise to keep u in my life,<br>
happy and safe always,<br>
love u ma future wife ❤️
</p>

<div class="counter" id="counter"></div>

<div class="forever">Forever ♾️</div>

<!-- ENVELOPE -->
<div class="envelope" onclick="openLetter()">

<div class="flap"></div>
<div class="base"></div>
<div class="sticker">💌</div>

<div class="letter">

<div class="message">
عمري ما هسيبك ابدا❤️<br>
 يا فراولتي💖
</div>

<div class="rose">🌹</div>

</div>

</div>

</div>

<script>

/* COUNTER */
function updateCounter(){
const start = new Date("2025-05-11T22:52:00");
const now = new Date();

const diff = now - start;

const days = Math.floor(diff/(1000*60*60*24));
const hours = Math.floor((diff/(1000*60*60))%24);
const mins = Math.floor((diff/(1000*60))%60);
const secs = Math.floor((diff/1000)%60);

document.getElementById("counter").innerHTML =
days+" days "+hours+" hrs "+mins+" mins "+secs+" secs ❤️";
}

updateCounter();
setInterval(updateCounter,1000);

/* OPEN */
function openLetter(){
document.querySelector(".envelope").classList.toggle("open");
}

/* HEARTS */
function createHeart(){
const h=document.createElement("div");
h.classList.add("heart");
h.innerHTML="❤️";
h.style.left=Math.random()*100+"vw";
h.style.animationDuration=(5+Math.random()*5)+"s";
document.body.appendChild(h);
setTimeout(()=>h.remove(),10000);
}

setInterval(createHeart,600);

</script>

</body>
</html>
