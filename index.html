<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forever Gift</title>

<style>
body{
margin:0;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ffd6e7,#fff);
font-family:Arial,sans-serif;
overflow:hidden;
padding:20px;
box-sizing:border-box;
}

.container{
width:90%;
max-width:700px;
text-align:center;
padding:30px;
border-radius:30px;
background:rgba(255,255,255,0.82);
backdrop-filter:blur(10px);
box-shadow:0 10px 30px rgba(255,0,80,.2);
position:relative;
z-index:2;
}

h1{
color:#d10047;
font-size:34px;
margin-bottom:20px;
}

p{
color:#b3003c;
font-size:19px;
line-height:1.8;
}

.counter{
margin-top:20px;
color:#d10047;
font-size:24px;
font-weight:bold;
}

.forever{
margin-top:20px;
font-size:32px;
color:red;
margin-bottom:30px;
}

.floating{
position:absolute;
font-size:28px;
animation:float 10s linear infinite;
opacity:.8;
pointer-events:none;
}

@keyframes float{
0%{
transform:translateY(100vh) scale(0.8);
opacity:0;
}
20%{opacity:1;}
100%{
transform:translateY(-10vh) scale(1.2);
opacity:0;
}
}

/* Envelope */

.envelope{
margin:auto;
position:relative;
width:300px;
height:210px;
cursor:pointer;
}

.base{
position:absolute;
bottom:0;
width:100%;
height:150px;
background:white;
border-radius:0 0 18px 18px;
box-shadow:0 8px 20px rgba(0,0,0,.12);
}

.flap{
position:absolute;
top:0;
width:100%;
height:130px;
background:#ffe1ec;
clip-path:polygon(0 0,100% 0,50% 100%);
transform-origin:top;
transition:1s;
z-index:5;
}

.sticker{
position:absolute;
top:68px;
left:50%;
transform:translateX(-50%);
background:#ff4f87;
color:white;
padding:8px 14px;
border-radius:50px;
font-size:24px;
z-index:6;
}

.letter{
position:absolute;
bottom:10px;
left:10px;
width:280px;
height:180px;
background:white;
border-radius:18px;
overflow:hidden;
transition:1s;
box-shadow:0 8px 18px rgba(0,0,0,.12);
}

.slider{
position:relative;
width:100%;
height:100%;
}

.slider img{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
opacity:0;
transition:1s;
}

.slider img.active{
opacity:1;
}

.open .flap{
transform:rotateX(180deg);
}

.open .letter{
transform:translateY(-110px);
}

@media(max-width:600px){
h1{font-size:26px;}
p{font-size:16px;}
.counter{font-size:20px;}
.envelope{
transform:scale(.9);
}
}
</style>
</head>

<body>

<div class="container">

<h1>🍓 Together for ever ma little juju 🍓</h1>

<p>
Love u ma baby girl,<br>
rich in life because I have u,<br>
I hope u stay in my life forever,<br>
I promise to keep u in my life,<br>
happy and safe always,<br>
love u ma future wife ❤️
</p>

<div class="counter" id="counter"></div>

<div class="forever">Forever ♾️</div>

<!-- الجواب -->
<div class="envelope" onclick="openLetter()">

<div class="flap"></div>
<div class="base"></div>
<div class="sticker">🍓</div>

<div class="letter">
<div class="slider">

<img src="images/pic1.jpg" class="active">
<img src="images/pic2.jpg">
<img src="images/pic3.jpg">
<img src="images/pic4.jpg"> 
<img src="images/pic5.jpg">
<img src="images/pic6.jpg">
<img src="images/pic7.jpg">
<img src="images/pic8.jpg">  
<img src="images/pic9.jpg">

</div>
</div>

</div>

</div>

<script>

/* Counter */
function updateCounter() {

const start = new Date("2025-05-11T22:52:00");
const now = new Date();

const diff = now - start;

const days = Math.floor(diff / (1000 * 60 * 60 * 24));
const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
const mins = Math.floor((diff / (1000 * 60)) % 60);
const secs = Math.floor((diff / 1000) % 60);

document.getElementById("counter").innerHTML =
days + " days " +
hours + " hrs " +
mins + " mins " +
secs + " secs ❤️";
}

updateCounter();
setInterval(updateCounter,1000);

/* Floating */
function createFloating(){

const item=document.createElement("div");
item.classList.add("floating");

const icons=["🍓","❤️","🌹","🧸"];

item.innerHTML=icons[Math.floor(Math.random()*icons.length)];

item.style.left=Math.random()*100+"vw";
item.style.animationDuration=(6+Math.random()*5)+"s";
item.style.fontSize=(20+Math.random()*20)+"px";

document.body.appendChild(item);

setTimeout(function(){
item.remove();
},10000);
}
